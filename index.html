<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weight of Glory</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="art"></canvas>
<svg id="guitar-illustration" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="handdrawn" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.8" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    <radialGradient id="feather-gradient" cx="50%" cy="50%" r="50%">
      <stop offset="50%" stop-color="white" stop-opacity="1" />
      <stop offset="96%" stop-color="white" stop-opacity="0" />
    </radialGradient>
    <mask id="feather-mask">
      <rect x="0" y="0" width="400" height="400" fill="black" />
      <circle cx="200" cy="200" r="200" fill="url(#feather-gradient)" />
    </mask>
  </defs>

  <g mask="url(#feather-mask)">
    <!-- Acoustic Guitar Image background layer -->
    <image href="guitar_strum.jpg" x="0" y="0" width="400" height="400" preserveAspectRatio="xMidYMid slice" opacity="0.9" />

  <!-- Strings on the neck -->
  <g class="strings">
    <line class="string string-1" x1="170" y1="0" x2="170" y2="356" stroke="#4a4640" stroke-width="3.8" stroke-linecap="round" />
    <line class="string string-2" x1="182" y1="0" x2="182" y2="356" stroke="#4a4640" stroke-width="3.4" stroke-linecap="round" />
    <line class="string string-3" x1="194" y1="0" x2="194" y2="356" stroke="#4a4640" stroke-width="3.0" stroke-linecap="round" />
    <line class="string string-4" x1="206" y1="0" x2="206" y2="356" stroke="#4a4640" stroke-width="2.6" stroke-linecap="round" />
    <line class="string string-5" x1="218" y1="0" x2="218" y2="356" stroke="#4a4640" stroke-width="2.2" stroke-linecap="round" />
    <line class="string string-6" x1="230" y1="0" x2="230" y2="356" stroke="#4a4640" stroke-width="1.8" stroke-linecap="round" />
  </g>

  <!-- Guitar Bridge, Saddle & Pins -->
  <g class="bridge">
    <!-- Symmetric, lighter bridge wood base -->
    <path class="bridge-base" d="M 120 355 C 120 345 140 335 160 335 C 175 335 188 330 200 330 C 212 330 225 335 240 335 C 260 335 280 345 280 355 C 280 365 250 368 200 368 C 150 368 120 365 120 355 Z" fill="#5c5246" />
    
    <!-- Bone Saddle (slanted/inclined upwards from left to right) -->
    <line x1="156" y1="349" x2="244" y2="344" stroke="#eae5d9" stroke-width="3.2" stroke-linecap="round" />
    
    <!-- Bridge Pins -->
    <circle cx="170" cy="358" r="3.5" fill="#eae5d9" stroke="#3d372e" stroke-width="1" />
    <circle cx="170" cy="358" r="1" fill="#3d372e" />
    
    <circle cx="182" cy="358" r="3.5" fill="#eae5d9" stroke="#3d372e" stroke-width="1" />
    <circle cx="182" cy="358" r="1" fill="#3d372e" />
    
    <circle cx="194" cy="358" r="3.5" fill="#eae5d9" stroke="#3d372e" stroke-width="1" />
    <circle cx="194" cy="358" r="1" fill="#3d372e" />
    
    <circle cx="206" cy="358" r="3.5" fill="#eae5d9" stroke="#3d372e" stroke-width="1" />
    <circle cx="206" cy="358" r="1" fill="#3d372e" />
    
    <circle cx="218" cy="358" r="3.5" fill="#eae5d9" stroke="#3d372e" stroke-width="1" />
    <circle cx="218" cy="358" r="1" fill="#3d372e" />
    
    <circle cx="230" cy="358" r="3.5" fill="#eae5d9" stroke="#3d372e" stroke-width="1" />
    <circle cx="230" cy="358" r="1" fill="#3d372e" />
  </g>
  </g>
</svg>
<div id="stage"></div>
<div id="gate"><div class="inner">
  <h1>The Weight of Glory</h1>
  <p class="pulse">touch to begin</p>
</div></div>

<div id="bar">
  <button id="pp" aria-label="play / pause">&#10074;&#10074;</button>
  <div id="time">0:00 / 0:00</div>
  <div id="seek"><div id="track"></div><div id="fill"></div><div id="knob"></div></div>
</div>

<audio id="aud" src="Audio/weight.mp3"></audio>

<div id="attribution" class="hide">
  <div class="attr-card">
    <h3>The Weight of Glory</h3>
    <div class="attr-divider"></div>
    <div class="attr-row">
      <span class="attr-label">Lyrics</span>
      <span class="attr-value">Written and arranged by Ian Choi</span>
    </div>
    <div class="attr-row">
      <span class="attr-label">Music</span>
      <span class="attr-value">Composed & produced by Ian Choi, co-created with Suno AI</span>
    </div>
    <div class="attr-footer">
      <p>© 2026 Ian Choi. All Rights Reserved.</p>
    </div>
  </div>
</div>

<script defer src="script.js"></script>
</body>
</html>
